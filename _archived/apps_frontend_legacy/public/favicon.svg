<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6600;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8533;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Black background -->
  <rect width="200" height="200" fill="#000000"/>
  
  <!-- Left vertical bar (yellow-orange) -->
  <rect x="45" y="30" width="25" height="120" fill="url(#orangeGradient)" rx="3"/>
  
  <!-- Top right curved shape -->
  <path d="M 90 50 Q 140 50 140 90 Q 140 130 110 140 L 90 140 Z" fill="none" stroke="url(#orangeGradient)" stroke-width="12" stroke-linecap="round"/>
  
  <!-- Bottom right curved shape -->
  <path d="M 90 140 Q 140 140 140 170 Q 140 180 120 180 L 90 180 Z" fill="none" stroke="url(#orangeGradient)" stroke-width="12" stroke-linecap="round"/>
  
  <!-- Silver/gray outline accents -->
  <path d="M 70 40 Q 150 40 160 100 Q 160 160 100 170" fill="none" stroke="#C0C0C0" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
</svg>