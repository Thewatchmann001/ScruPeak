services:
  # PostgreSQL Database
  postgis_db:
    image: postgis/postgis:15-3.4
    container_name: landbiznes_db
    environment:
      POSTGRES_USER: landbiznes
      POSTGRES_PASSWORD: landbiznes
      POSTGRES_DB: landbiznes
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - landbiznes-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U landbiznes"]
      interval: 10s
      timeout: 5s
      retries: 5

  # API Gateway
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: landbiznes_api_gateway
    environment:
      PORT: 3000
      NODE_ENV: production
      PARCEL_SERVICE_URL: http://parcel-service:3001
      GRID_SERVICE_URL: http://grid-service:3002
      CONFLICT_SERVICE_URL: http://conflict-service:3003
      OWNERSHIP_SERVICE_URL: http://ownership-service:3004
      OWNER_SERVICE_URL: http://owner-service:3005
      DB_HOST: postgis_db
      DB_PORT: 5432
      DB_USER: landbiznes
      DB_PASSWORD: landbiznes
      DB_NAME: landbiznes
    ports:
      - "3000:3000"
    depends_on:
      postgis_db:
        condition: service_healthy
    networks:
      - landbiznes-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Parcel Microservice
  parcel-service:
    build:
      context: ./services/parcel-service
      dockerfile: Dockerfile
    container_name: landbiznes_parcel_service
    environment:
      PORT: 3001
      DB_HOST: postgis_db
      DB_PORT: 5432
      DB_USER: landbiznes
      DB_PASSWORD: landbiznes
      DB_NAME: landbiznes
    ports:
      - "3001:3001"
    depends_on:
      postgis_db:
        condition: service_healthy
    networks:
      - landbiznes-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Grid Microservice
  grid-service:
    build:
      context: ./services/grid-service
      dockerfile: Dockerfile
    container_name: landbiznes_grid_service
    environment:
      PORT: 3002
      DB_HOST: postgis_db
      DB_PORT: 5432
      DB_USER: landbiznes
      DB_PASSWORD: landbiznes
      DB_NAME: landbiznes
    ports:
      - "3002:3002"
    depends_on:
      postgis_db:
        condition: service_healthy
    networks:
      - landbiznes-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Conflict Microservice
  conflict-service:
    build:
      context: ./services/conflict-service
      dockerfile: Dockerfile
    container_name: landbiznes_conflict_service
    environment:
      PORT: 3003
      DB_HOST: postgis_db
      DB_PORT: 5432
      DB_USER: landbiznes
      DB_PASSWORD: landbiznes
      DB_NAME: landbiznes
    ports:
      - "3003:3003"
    depends_on:
      postgis_db:
        condition: service_healthy
    networks:
      - landbiznes-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Ownership Microservice
  ownership-service:
    build:
      context: ./services/ownership-service
      dockerfile: Dockerfile
    container_name: landbiznes_ownership_service
    environment:
      PORT: 3004
      DB_HOST: postgis_db
      DB_PORT: 5432
      DB_USER: landbiznes
      DB_PASSWORD: landbiznes
      DB_NAME: landbiznes
    ports:
      - "3004:3004"
    depends_on:
      postgis_db:
        condition: service_healthy
    networks:
      - landbiznes-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3004/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # React Frontend (optional - can also run locally)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: landbiznes_frontend
    environment:
      REACT_APP_API_URL: http://localhost:3000/api
    ports:
      - "3006:3000"
    depends_on:
      - api-gateway
    networks:
      - landbiznes-network

networks:
  landbiznes-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
