services:
  # =========================================================================
  # Core Infrastructure
  # =========================================================================
  db:
    image: postgis/postgis:15-3.4
    container_name: scrupeak_db
    environment:
      POSTGRES_DB: scrupeak
      POSTGRES_USER: scrupeak
      POSTGRES_PASSWORD: scrupeak
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scrupeak"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - scrupeak-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: scrupeak_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - scrupeak-network
    restart: unless-stopped
    command: redis-server --appendonly yes

  # MeiliSearch Search Engine
  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name: scrupeak_search
    environment:
      - MEILI_MASTER_KEY=masterKey123
      - MEILI_ENV=production
    ports:
      - "7700:7700"
    volumes:
      - meili_data:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - scrupeak-network
    restart: unless-stopped

  # =========================================================================
  # Microservices
  # =========================================================================
  
  # Main Backend Service (User, Auth, Payments, Land CRUD)
  backend:
    build: 
      context: ./apps/backend
    container_name: scrupeak_backend
    environment:
      - DATABASE_URL=postgresql://scrupeak:scrupeak@db:5432/scrupeak
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=changeme_dev_secret_key
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - MEILI_URL=http://meilisearch:7700
      - MEILI_MASTER_KEY=masterKey123
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    networks:
      - scrupeak-network
    restart: unless-stopped

  # Celery Worker (Background Tasks)
  worker:
    build:
      context: ./apps/backend
    container_name: scrupeak_worker
    command: celery -A app.core.celery_app.celery worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql://scrupeak:scrupeak@db:5432/scrupeak
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=changeme_dev_secret_key
      - MEILI_URL=http://meilisearch:7700
      - MEILI_MASTER_KEY=masterKey123
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - backend
      - redis
      - db
      - meilisearch
    networks:
      - scrupeak-network
    restart: unless-stopped

  # Spatial Intelligence Service (Geometry, Validation, Grid)
  spatial-service:
    build:
      context: ./apps/spatial-service
    container_name: scrupeak_spatial
    environment:
      - DATABASE_URL=postgresql://scrupeak:scrupeak@db:5432/scrupeak
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
    networks:
      - scrupeak-network
    restart: unless-stopped

  # AI Service (Chatbot, Valuation, Suitability)
  ai-service:
    build:
      context: ./apps/ai-service
    container_name: scrupeak_ai
    environment:
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    networks:
      - scrupeak-network
    restart: unless-stopped

  # =========================================================================
  # Gateway & Frontend
  # =========================================================================

  # API Gateway (Routing, Rate Limiting, Aggregation)
  api-gateway:
    build:
      context: ./apps/api-gateway
    container_name: scrupeak_gateway
    ports:
      - "8000:3000"
    environment:
      - PORT=3000
      - BACKEND_URL=http://backend:8000
      - SPATIAL_URL=http://spatial-service:8000
      - AI_URL=http://ai-service:8000
    depends_on:
      - backend
      - spatial-service
      - ai-service
    networks:
      - scrupeak-network
    restart: unless-stopped

  # Web Frontend (React + Vite)
  web:
    build:
      context: ./apps/web
    container_name: scrupeak_web
    ports:
      - "3000:80"
    depends_on:
      - api-gateway
    networks:
      - scrupeak-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  meili_data:
    driver: local

networks:
  scrupeak-network:
    driver: bridge
