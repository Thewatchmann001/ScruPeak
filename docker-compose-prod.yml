version: '3.9'

services:
  # =========================================================================
  # PostgreSQL Database with PostGIS
  # =========================================================================
  postgres:
    image: postgis/postgis:15-3.4
    container_name: scrupeak-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: scrupeak_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - scrupeak-network

  # =========================================================================
  # Redis Cache
  # =========================================================================
  redis:
    image: redis:7-alpine
    container_name: scrupeak-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - scrupeak-network

  # =========================================================================
  # ScruPeak Backend API
  # =========================================================================
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: scrupeak-backend
    environment:
      ENVIRONMENT: production
      DEBUG: "False"
      HOST: 0.0.0.0
      PORT: 8000
      WORKERS: 4
      LOG_LEVEL: INFO
      LOG_FORMAT: json
      
      # Database
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: scrupeak_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_POOL_SIZE: 20
      DB_MAX_OVERFLOW: 40
      
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_POOL_SIZE: 50
      
      # Security
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-minimum-32-characters}
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: 30
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: 7
      
      # CORS
      CORS_ORIGINS: '["http://localhost:3000", "http://localhost:3001", "http://frontend:3000"]'
      
      # Rate Limiting
      RATE_LIMIT_ENABLED: "true"
      RATE_LIMIT_REQUESTS: 1000
      RATE_LIMIT_PERIOD: 60
    
    ports:
      - "8000:8000"
    
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    
    volumes:
      - ./apps/backend:/app
      - backend_logs:/app/logs
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
    networks:
      - scrupeak-network
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # =========================================================================
  # Frontend (Next.js)
  # =========================================================================
  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: scrupeak-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      NODE_ENV: production
    depends_on:
      - backend
    networks:
      - scrupeak-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # =========================================================================
  # Nginx Reverse Proxy (Optional)
  # =========================================================================
  nginx:
    image: nginx:alpine
    container_name: scrupeak-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - scrupeak-network
    profiles:
      - proxy

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  backend_logs:
    driver: local

networks:
  scrupeak-network:
    driver: bridge
