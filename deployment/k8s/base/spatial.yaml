apiVersion: apps/v1
kind: Deployment
metadata:
  name: scrupeak-spatial
spec:
  replicas: 2
  selector:
    matchLabels:
      app: spatial
  template:
    metadata:
      labels:
        app: spatial
    spec:
      containers:
      - name: spatial
        image: scrupeak/spatial:latest
        ports:
        - containerPort: 8000
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: scrupeak-spatial
spec:
  selector:
    app: spatial
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
  type: ClusterIP
